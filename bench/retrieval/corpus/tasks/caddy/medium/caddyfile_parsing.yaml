id: caddy-medium-005
repo: caddy
tier: medium
description: "How does caddy parse a Caddyfile into tokens and then into structured configuration directives?"
source: manual
ground_truth:
  - Adapter
  - Adapter.Adapt
  - Dispenser
  - Dispenser.Next
  - Dispenser.NextBlock
