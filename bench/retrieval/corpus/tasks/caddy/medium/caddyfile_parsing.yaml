tags: [caddyfile, parsing, config, cross-package]
notes: "Adapter.Adapt converts Caddyfile bytes to JSON. Dispenser provides the token iteration API (Next, NextBlock for block-scoped tokens). ServerType interface defines how the parsed tokens get translated into app-specific config."
