id: caddy-hard-006
repo: caddy
tier: hard
description: "How does caddy build a TLS configuration for incoming connections, including connection policy matching, cipher suite selection, client authentication, and certificate selection?"
source: manual
ground_truth:
  - ConnectionPolicies
  - ConnectionPolicies.TLSConfig
  - ConnectionPolicy
  - ConnectionPolicy.buildStandardTLSConfig
  - ConnectionMatcher
  - ClientAuthentication
  - ClientAuthentication.ConfigureTLSConfig
  - CustomCertSelectionPolicy
  - CustomCertSelectionPolicy.SelectCertificate
tags: [tls, connection-policy, client-auth, certificate, architecture]
notes: "ConnectionPolicies.TLSConfig builds the net/tls config. Each ConnectionPolicy matches via ConnectionMatcher and builds its own TLS settings via buildStandardTLSConfig. ClientAuthentication.ConfigureTLSConfig sets up mTLS verification. CustomCertSelectionPolicy.SelectCertificate handles SNI-based cert selection."
