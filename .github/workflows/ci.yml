name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/defn/

      - name: Unit tests
        run: CGO_ENABLED=1 go test ./... -count=1 -timeout 5m

      - name: Vet
        run: go vet ./...

      - name: Self-hosting round-trip
        env:
          DEFN_DB: .defn
        run: |
          ./defn ingest .
          ./defn emit /tmp/defn-emit
          cd /tmp/defn-emit && go build ./cmd/defn/
